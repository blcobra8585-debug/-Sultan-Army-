name: Sultan-Cloud-Strike-V103

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Agar koi extra library chahiye toh yahan add kar sakte ho

      - name: Execute Sultan Strike
        run: |
          # Sabse zaroori line: Bina ../ ke seedha target.txt read karna
          python3 attack.py $(cat target.txt) 300
          
